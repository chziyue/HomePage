<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Home Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --shadow-glow: 0 0 40px rgba(0, 212, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            position: relative;
        }

        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* Grid pattern overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -1;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            text-align: center;
            padding: 40px 20px 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        .button-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 8px;
        }

        .page-button {
            position: relative;
            padding: 12px 24px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-primary);
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .page-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .page-button:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.05);
            transform: translateY(-2px);
        }

        .page-button:hover::before {
            opacity: 0.1;
        }

        .page-button span {
            position: relative;
            z-index: 1;
        }

        .site {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-primary);
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 16px 12px;
            height: 140px;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .site::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(0, 212, 255, 0.1) 0%, 
                transparent 50%, 
                rgba(168, 85, 247, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .site::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.6s ease;
        }

        .site:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(0, 212, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .site:hover::before {
            opacity: 1;
        }

        .site:hover::after {
            left: 100%;
        }

        .site img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            position: relative;
            z-index: 1;
        }

        .site:hover img {
            transform: scale(1.08) translateY(-4px);
            filter: drop-shadow(0 8px 16px rgba(10, 10, 15, 0.6));
        }

        .site span {
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            position: relative;
            z-index: 1;
        }

        .site:hover span {
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* Flying animation */
        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); }
        }

        .site.flying {
            animation: fly var(--duration) ease-in-out infinite alternate;
        }

        @keyframes return {
            0% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .site.returning {
            animation: return var(--return-duration) cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Responsive design */
        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                padding: 16px;
            }
            
            .site {
                height: 130px;
                padding: 14px 10px;
            }
            
            .site img {
                width: 56px;
                height: 56px;
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 12px;
            }
            
            h1 {
                font-size: 2rem;
                padding: 30px 16px 16px;
            }
            
            .site {
                height: 120px;
                padding: 12px 8px;
                border-radius: 16px;
            }
            
            .site img {
                width: 48px;
                height: 48px;
                border-radius: 12px;
            }
            
            .site span {
                font-size: 11px;
            }
            
            .page-button {
                padding: 10px 18px;
                font-size: 12px;
            }
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <h1>Home Page</h1>
    <div class="grid" id="siteGrid">
        <div class="button-container">
            <a href="#" class="page-button" id="effectToggle"><span>Toggle Effect</span></a>
            <a href="#" class="page-button" id="pageToggle"><span>Next Page</span></a>
        </div>
    </div>

    <!-- Floating particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 25%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 7s;"></div>
    <div class="particle" style="left: 55%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 85%; animation-delay: 9s;"></div>

    <script>
        const sites = [
            //第一页
            //第一行
            { name: "Memos", url: "http://192.168.5.253:5230/", icon: "img/memos.png" },
            { name: "Ward", url: "http://192.168.5.254:4000/", icon: "img/ward.png" },
            { name: "NETDATA", url: "http://192.168.5.254:19999/", icon: "img/netdata.png" },
            { name: "Portainer", url: "http://192.168.5.253:9000/#!/2/docker/containers", icon: "img/portainer.png" },
            { name: "Speedtest-X", url: "http://192.168.5.253:9001/", icon: "img/speedtest-x.png" },
            { name: "Wiki", url: "http://192.168.5.254:7000/", icon: "img/wiki.png" },
            { name: "OpenWrt", url: "http://192.168.5.251/", icon: "img/OpenWrt.png" },
            { name: "ZTE Router", url: "http://192.168.5.1/", icon: "img/router.png" },
            //第二行
            { name: "Claude", url: "http://192.168.5.250:18456/", icon: "img/Claude.png" },
            { name: "OpenClaw", url: "http://192.168.5.250:18789/", icon: "img/OpenClaw.png" },
            { name: "Doubao", url: "https://www.doubao.com/", icon: "img/Doubao.png" },
            { name: "Kimi", url: "https://www.kimi.com/", icon: "img/Kimi.png" },
            { name: "Qwen", url: "https://www.qianwen.com/", icon: "img/Qwen.png" },
            { name: "DeepSeek", url: "https://chat.deepseek.com/", icon: "img/DeepSeek.png" },
            { name: "fnOS", url: "http://192.168.5.254:5666/", icon: "img/fnOS.png" },
            { name: "Photo", url: "http://192.168.5.254:5666/p", icon: "img/Photo.png" },
            //第三行
            { name: "npm", url: "http://192.168.5.253:81/", icon: "img/npm.png" },
            { name: "Gitea", url: "http://192.168.5.253:3000/", icon: "img/gitea.png" },
            { name: "DNSPod", url: "https://console.cloud.tencent.com/cns", icon: "img/tencent.png" },
            { name: "taobao", url: "https://www.taobao.com/", icon: "img/taobao.png" },
            { name: "jd", url: "https://www.jd.com/", icon: "img/jd.png" },
            { name: "bilibili", url: "https://www.bilibili.com/", icon: "img/bilibili.png" },
            { name: "immich", url: "http://192.168.5.253:2283/", icon: "img/immich.png" },
            { name: "CPU", url: "https://cpu.bmcx.com/", icon: "img/cpu.png" },
            //第四行
            { name: "Baidu", url: "https://www.baidu.com/", icon: "img/baidu.png" },
            { name: "Google", url: "https://www.google.com/", icon: "img/google.png" },
            { name: "Bing", url: "https://www.bing.com/", icon: "img/bing.png" },
            { name: "YouTube", url: "https://www.youtube.com/", icon: "img/youtube.png" },
            { name: "GitHub", url: "https://github.com/", icon: "img/github.png" },
            { name: "dockerhub", url: "https://hub.docker.com/", icon: "img/docker.png" },
            { name: "translate", url: "https://fanyi.baidu.com/", icon: "img/fanyi.png" },
            { name: "chziyue.github.io", url: "https://chziyue.github.io/", icon: "img/chziyue.png" },

            //第二页
            { name: "icloud", url: "https://www.icloud.com.cn/", icon: "img/icloud.png" },
            { name: "douban", url: "https://www.douban.com/", icon: "img/douban.png" },
            { name: "composerize", url: "https://chziyue.github.io/docker-to-compose/", icon: "img/composerize.png" },
        ];

        const siteGrid = document.getElementById('siteGrid');
        const buttonContainer = siteGrid.querySelector('.button-container');
        const pageButton = buttonContainer.querySelector('#pageToggle');
        const effectButton = buttonContainer.querySelector('#effectToggle');

        let currentPage = 1;
        const sitesPerPage = 32;
        let effectEnabled = localStorage.getItem('effectEnabled') === 'true';

        function displaySites() {
            while (siteGrid.children.length > 1) {
                siteGrid.removeChild(siteGrid.lastChild);
            }

            const startIndex = (currentPage - 1) * sitesPerPage;
            const endIndex = Math.min(startIndex + sitesPerPage, sites.length);

            for (let i = startIndex; i < endIndex; i++) {
                const site = sites[i];
                const siteElement = document.createElement('a');
                siteElement.href = site.url;
                siteElement.className = 'site';
                siteElement.target = '_blank';
                siteElement.rel = 'noopener noreferrer';

                const img = document.createElement('img');
                img.src = site.icon;
                img.alt = `${site.name} icon`;
                img.width = 64;
                img.height = 64;

                const span = document.createElement('span');
                span.textContent = site.name;

                siteElement.appendChild(img);
                siteElement.appendChild(span);
                siteGrid.appendChild(siteElement);
            }

            pageButton.querySelector('span').textContent = currentPage === 1 ? 'Next Page' : 'Previous Page';
            effectButton.querySelector('span').textContent = effectEnabled ? 'Disable Effect' : 'Enable Effect';
        }

        pageButton.addEventListener('click', function(e) {
            e.preventDefault();
            currentPage = currentPage === 1 ? 2 : 1;
            displaySites();
        });

        effectButton.addEventListener('click', function(e) {
            e.preventDefault();
            effectEnabled = !effectEnabled;
            localStorage.setItem('effectEnabled', effectEnabled);
            displaySites();
            if (effectEnabled) {
                resetInactivityTimer();
            } else {
                clearTimeout(inactivityTimer);
                if (isFlying) {
                    stopFlying();
                }
            }
        });

        let inactivityTimer;
        let isFlying = false;

        function resetInactivityTimer() {
            if (!effectEnabled) return;
            clearTimeout(inactivityTimer);
            if (isFlying) {
                stopFlying();
            }
            inactivityTimer = setTimeout(startFlying, 3000);
        }

        function getRandomOffset() {
            return (Math.random() - 0.5) * 300;
        }

        function getRandomRotation() {
            return (Math.random() - 0.5) * 40;
        }

        function getRandomDuration() {
            return 4 + Math.random() * 3;
        }

        function startFlying() {
            isFlying = true;
            document.querySelectorAll('.site').forEach(site => {
                const tx = getRandomOffset();
                const ty = getRandomOffset();
                const tr = getRandomRotation();
                const duration = getRandomDuration();
                
                site.style.setProperty('--tx', `${tx}px`);
                site.style.setProperty('--ty', `${ty}px`);
                site.style.setProperty('--tr', `${tr}deg`);
                site.style.setProperty('--duration', `${duration}s`);
                
                site.classList.add('flying');
            });
        }

        function stopFlying() {
            isFlying = false;
            const sites = document.querySelectorAll('.site');
            
            sites.forEach(site => {
                const computedStyle = window.getComputedStyle(site);
                const transform = new DOMMatrix(computedStyle.transform);
                const currentX = transform.m41;
                const currentY = transform.m42;
                const currentRotation = Math.atan2(transform.m21, transform.m11) * (180 / Math.PI);

                site.style.setProperty('--tx', `${currentX}px`);
                site.style.setProperty('--ty', `${currentY}px`);
                site.style.setProperty('--tr', `${currentRotation}deg`);

                const distance = Math.sqrt(currentX * currentX + currentY * currentY);
                const returnDuration = Math.min(Math.max(distance / 300, 0.4), 0.8);
                site.style.setProperty('--return-duration', `${returnDuration}s`);

                site.classList.remove('flying');
                
                requestAnimationFrame(() => {
                    site.classList.add('returning');
                });

                site.addEventListener('animationend', function onAnimationEnd() {
                    site.classList.remove('returning');
                    site.style.removeProperty('--tx');
                    site.style.removeProperty('--ty');
                    site.style.removeProperty('--tr');
                    site.style.removeProperty('--duration');
                    site.style.removeProperty('--return-duration');
                    site.removeEventListener('animationend', onAnimationEnd);
                }, { once: true });
            });
        }

        ['mousemove', 'keydown', 'click', 'scroll'].forEach(eventType => {
            document.addEventListener(eventType, resetInactivityTimer);
        });

        if (effectEnabled) {
            resetInactivityTimer();
        }

        displaySites();
    </script>
</body>
</html>
